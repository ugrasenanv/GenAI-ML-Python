# GitHub Actions Workflow: Declarative Automation Bundle CI/CD
#
# This workflow automates:
# 1. Code validation: Syntax checks for Python notebooks and YAML configs
# 2. Bundle validation: Ensures DAB structure and task dependencies are correct
# 3. Automated deployment: Pushes changes to Databricks workspace
#
# Triggers:
# - On pull_request to any branch (for validation and feedback)
# - On push to development branch (for deployment to dev environment)

name: Databricks Bundle CI/CD

env:
  MODE: ${{ (github.ref_name == 'master' || github.base_ref == 'master') && 'prod' || 'dev' }}

on:
  # Manual trigger for testing and debugging
  workflow_dispatch:
    inputs:
      MODE:
        description: 'Deployment target environment'
        required: true
        default: 'dev'
        options:
          - dev
          - prod

  # Trigger on push to any branch
  push:
    branches:
      - "development"
      - "master"
    paths:
      - '7_ml_pipelines/src/**'
      - '7_ml_pipelines/resources/**'
      - '7_ml_pipelines/databricks.yml'

jobs:
  # ===== JOB 1: VALIDATION =====
  validate-bundle:
    name: "Validate Bundle Configuration"
    runs-on: ubuntu-latest
    environment: declarative_automation_bundles 
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    defaults:
      run:
        working-directory: 7_ml_pipelines
    
    steps:
      # Step 1: Checkout the repository code
      # This makes the code available to subsequent steps
      - name: "Checkout Code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for diff operations
      
      # Step 2: Install Databricks CLI
      # The CLI provides commands for validation and deployment
      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v0.297.2  # Pin to specific version for reproducibility

      # Step 3: Validate bundle syntax and structure
      # This checks:
      # - YAML syntax correctness
      # - Task dependency graph (DAG) validity
      # - Variable definitions completeness
      # - Resource naming conventions
      - name: "Validate Bundle"
        run: |
          echo "Validating Declarative Automation Bundle for target: $MODE..."
          databricks bundle validate --target $MODE
          echo "Bundle validation passed"

      # Step 4: Display bundle structure (debugging)
      # This shows what resources would be deployed
      - name: "Display Bundle Resources"
        run: |
          echo "Bundle structure for target: $MODE:"
          databricks bundle summary --target $MODE || true

  # ===== JOB 2: DEPLOYMENT (CD) =====
  # This job only runs on push to main (not on pull_request)
  deploy-dev:
    name: "Deploy and Run Bundle"
    runs-on: ubuntu-latest
    environment: declarative_automation_bundles 
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    defaults:
      run:
        working-directory: 7_ml_pipelines
    
    needs: validate-bundle  # Wait for validation to complete first
    
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v0.297.2

      # Step 1: Validate again (defensive programming)
      - name: "Pre-deployment Validation"
        run: |
          echo "Running pre-deployment validation..."
          databricks bundle validate --target $MODE
          echo "Pre-deployment validation passed"

      # Step 2: Deploy to target environment
      # This creates/updates:
      # - Notebooks in workspace
      # - Jobs in the workspace
      # - Any other resources defined in resources/*.yml
      - name: "Deploy Bundle"
        run: |
          echo "Deploying to $MODE environment..."
          databricks bundle deploy --target $MODE
          echo "Deployment to dev completed"

      # Step 3: Verify deployment
      # List created resources to confirm deployment success
      - name: "Verify Deployment"
        run: |
          echo "Verifying deployed resources..."
          echo ""
          echo "=== Jobs in Workspace ==="
          databricks jobs list --output json | jq '.[]' || true
          echo ""
          echo "=== Bundle Status ==="
          databricks bundle summary --target $MODE || true

      # Step 4: Run the deployed bundle
      # This executes the ML pipeline job to ensure it runs successfully after deployment
      - name: "Run bundle"
        run: |
          echo "Running bundle in $MODE environment..."
          databricks bundle run --target $MODE mnist_ml_pipeline
          echo "Bundle execution in dev completed"

      # Step 4: Comment on PR (if applicable) with deployment info
      - name: "Post Deployment Status"
        if: always()
        run: |
          echo "Deployment Status: SUCCESS"
          echo "Environment: $MODE"